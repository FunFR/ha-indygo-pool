name: Validate

on:
  schedule:
    # Run daily at 04:00 AM UTC
    - cron: '0 4 * * *'
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master
      - name: HACS validation
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration
          ignore: brands
